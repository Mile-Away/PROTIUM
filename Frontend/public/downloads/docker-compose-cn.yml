services:
  db:
    image: registry.cn-beijing.aliyuncs.com/protium/postgres:16.4
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  elasticsearch:
    image: registry.cn-beijing.aliyuncs.com/protium/elasticsearch:8.15.0
    environment:
      - discovery.type=single-node
      - ELASTICSEARCH_USERNAME=${ELASTICSEARCH_USERNAME}
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD}
      - xpack.security.http.ssl.enabled=false
      - xpack.license.self_generated.type=trial
    ports:
      - "9200:9200"

  backend:
    build:
      context: ./Backend
    image: registry.cn-beijing.aliyuncs.com/protium/backend
    env_file:
      - .env
    environment:
      - ENV=production
    command: ["/app/entrypoint.sh"]
    ports:
      - "8000:8000"
    depends_on:
      - elasticsearch
      - db

  frontend:
    build: 
      context: ./Frontend
    image: registry.cn-beijing.aliyuncs.com/protium/frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  workflow:
    build: 
      context: ./Protium
    image: registry.cn-beijing.aliyuncs.com/protium/workflow
    ports:
      - "3003:3003"
    depends_on:
      - frontend

  docfront:
    build:
      context: ./DocFront
    image: registry.cn-beijing.aliyuncs.com/protium/docfront
    ports:
      - "4000:4000"
    depends_on:
      - frontend

volumes:
  pgdata: